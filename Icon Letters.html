<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alsudaisi T. Olama</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 40px 20px;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    min-height: 100vh;
  }

  .header {
    text-align: center;
    margin-bottom: 50px;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .name-container {
    max-width: 1400px;
    margin: 0 auto;
  }

  .name-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-bottom: 30px;
    padding: 20px 0;
  }

  .letter-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    opacity: 0;
    transform: translateY(50px);
    animation: fadeSlideIn 0.6s ease-out forwards;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    border: 3px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .letter-circle:nth-child(1) {
    animation-delay: 0.1s; background: linear-gradient(135deg, #ff7e5f, #feb47b); 
  }
  .letter-circle:nth-child(2) { 
    animation-delay: 0.15s; background: linear-gradient(135deg, #43cea2, #185a9d); 
  }
  .letter-circle:nth-child(3) {
   animation-delay: 0.2s; background: linear-gradient(135deg, #fa709a, #fee140); 
  }
  .letter-circle:nth-child(4) {
   animation-delay: 0.25s; background: linear-gradient(135deg, #30cfd0, #330867); 
  }
  .letter-circle:nth-child(5) {
   animation-delay: 0.3s; background: linear-gradient(135deg, #a18cd1, #fbc2eb); 
  }
  .letter-circle:nth-child(6) {
   animation-delay: 0.35s; background: linear-gradient(135deg, #f7971e, #ffd200); 
  }
  .letter-circle:nth-child(7) {
   animation-delay: 0.4s; background: linear-gradient(135deg, #00c6ff, #0072ff); 
  }
  .letter-circle:nth-child(8) {
   animation-delay: 0.45s; background: linear-gradient(135deg, #ff512f, #dd2476); 
  }
  .letter-circle:nth-child(9) {
   animation-delay: 0.5s; background: linear-gradient(135deg, #11998e, #38ef7d); 
  }
  .letter-circle:nth-child(10) {
   animation-delay: 0.55s; background: linear-gradient(135deg, #fc466b, #3f5efb); 
  }
  .letter-circle:nth-child(11) {
   animation-delay: 0.6s; background: linear-gradient(135deg, #ff9966, #ff5e62); 
  }
  .letter-circle:nth-child(12) {
   animation-delay: 0.65s; background: linear-gradient(135deg, #667eea, #764ba2); 
  }
  .letter-circle:nth-child(13) {
   animation-delay: 0.7s; background: linear-gradient(135deg, #f093fb, #f5576c); 
  }
  .letter-circle:nth-child(14) {
   animation-delay: 0.75s; background: linear-gradient(135deg, #4facfe, #00f2fe); 
  }
  .letter-circle:nth-child(15) {
   animation-delay: 0.8s; background: linear-gradient(135deg, #43e97b, #38f9d7); 
  }

  @keyframes fadeSlideIn {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .letter-circle:hover {
    transform: scale(1.1);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  }

  .middle-section {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    margin: 50px 0;
  }

  .period {
    font-size: 4.5rem;
    color: #ff6b6b;
    animation: pulse 2s infinite;
    font-weight: 900;
    text-shadow: 0 0 25px rgba(255, 107, 107, 0.9);
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  @media (max-width: 768px) {
    .letter-circle {
      width: 70px;
      height: 70px;
      font-size: 2rem;
    }
    h1 {
     font-size: 2.2rem; 
   }
    .middle-section {
     gap: 25px; 
   }
  }
</style>

</head>
<body>

<div class="name-container">
  </div>
  <div class="name-row">
    <div class="letter-circle"><i class="bi bi-caret-up-fill"></i></div>
    <div class="letter-circle"><i class="bi bi-graph-up-arrow"></i></div>
    <div class="letter-circle"><i class="bi bi-currency-dollar"></i></div>
    <div class="letter-circle"><i class="bi bi-type-underline"></i></div>
    <div class="letter-circle"><i class="bi bi-caret-right-fill"></i></div>
    <div class="letter-circle"><i class="bi bi-caret-up-fill"></i></div>
    <div class="letter-circle"><i class="bi bi-exclamation"></i></div>
    <div class="letter-circle"><i class="bi bi-currency-dollar"></i></div>
    <div class="letter-circle"><i class="bi bi-exclamation"></i></div>
  </div>

  <div class="middle-section">
    <div class="letter-circle"><i class="bi bi-align-top"></i></div>
    <div class="period">.</div>
  </div>

  <div class="name-row">
    <div class="letter-circle"><i class="bi bi-radioactive"></i></div>
    <div class="letter-circle"><i class="bi bi-graph-up-arrow"></i></div>
    <div class="letter-circle"><i class="bi bi-caret-up-fill"></i></div>
    <div class="letter-circle"><i class="bi bi-diagram-3-fill"></i></div>
    <div class="letter-circle"><i class="bi bi-caret-up-fill"></i></div>
  </div>
</div>

</body>
</html>
